<h2>资讯卡片设计感升级</h2>
<p class="subtitle">和你现有网站的编辑风格一致，选一种方向</p>

<style>
  .demo-card { margin-bottom: 16px; }
</style>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="padding:24px;background:var(--bg-alt);border-radius:8px;">
        <!-- 方案A：编辑杂志风 -->
        <div style="border-left:2px solid var(--accent);padding:16px 20px;background:var(--surface);border-radius:0 8px 8px 0;box-shadow:var(--shadow-card);">
          <div style="font-family:var(--font-display);font-size:16px;font-weight:400;color:var(--text-primary);line-height:1.4;margin-bottom:8px;">梁文锋留住97%员工</div>
          <div style="font-style:italic;font-size:13px;color:var(--text-secondary);line-height:1.5;margin-bottom:12px;">「稳定军心。」</div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:0.06em;">36KR · 05-04</span>
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--accent);letter-spacing:0.06em;">阅读 →</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A · 编辑杂志风</h3>
      <p>左侧品牌色竖线，标题用衬线体，摘要斜体加引号，底部左右分布来源和链接。有杂志排版的精致感。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="padding:24px;background:var(--bg-alt);border-radius:8px;">
        <!-- 方案B：数字卡片风 -->
        <div style="position:relative;padding:20px 20px 16px;background:var(--surface);border-radius:8px;box-shadow:var(--shadow-card);border:1px solid var(--border-subtle);">
          <div style="position:absolute;top:12px;right:16px;font-family:var(--font-mono);font-size:32px;font-weight:200;color:var(--border);line-height:1;">02</div>
          <div style="font-family:var(--font-body);font-size:15px;font-weight:600;color:var(--text-primary);line-height:1.4;margin-bottom:6px;padding-right:40px;">梁文锋留住97%员工</div>
          <div style="font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:14px;">「稳定军心。」</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">36kr</span>
            <span style="width:1px;height:10px;background:var(--border);"></span>
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">05-04</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B · 数字卡片风</h3>
      <p>右上角大号序号，标题加粗，摘要简短，底部来源和日期用竖线分隔。有设计感但不抢眼。</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="padding:24px;background:var(--bg-alt);border-radius:8px;">
        <!-- 方案C：极简线条风 -->
        <div style="padding:16px 0;border-bottom:1px solid var(--border-subtle);">
          <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:6px;">
            <span style="font-family:var(--font-display);font-size:17px;font-weight:400;color:var(--text-primary);line-height:1.3;">梁文锋留住97%员工</span>
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);white-space:nowrap;">05-04</span>
          </div>
          <div style="font-size:12px;color:var(--text-secondary);line-height:1.5;">「稳定军心。」</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C · 极简线条风</h3>
      <p>标题和日期同行，摘要在下方，底部分隔线。最克制，信息密度最高，适合快速扫读。</p>
    </div>
  </div>
</div>
